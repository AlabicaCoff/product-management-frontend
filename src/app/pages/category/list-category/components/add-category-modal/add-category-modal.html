<div class="modal-backdrop" (click)="closeAddModal()">
  <div class="modal-card modal-card--edit" (click)="$event.stopPropagation()" id="add-modal">
    <div class="modal-icon-wrap modal-icon-wrap--primary">
      <i class="bi bi-plus-lg"></i>
    </div>
    <h2 class="modal-title">Add Category</h2>
    <p class="modal-desc">Fill in the details to create a new category.</p>

    <form class="edit-form" [formGroup]="form">
      <!-- Name -->
      <div class="edit-form-group">
        <label for="add-name" class="edit-label">Name <span class="required">*</span></label>
        <input
          id="add-name"
          type="text"
          class="edit-input"
          placeholder="Category name"
          formControlName="name"
          [class.input-error]="form.controls['name'].invalid && form.controls['name'].touched"
        />
        @if (form.controls['name'].invalid && form.controls['name'].touched) {
          <span class="field-error">Name is required.</span>
        }
      </div>

      <!-- Description -->
      <div class="edit-form-group">
        <label for="add-description" class="edit-label">Description</label>
        <textarea
          id="add-description"
          class="edit-input edit-textarea"
          placeholder="Category description (optional)"
          formControlName="description"
          rows="3"
        ></textarea>
      </div>
    </form>

    <div class="modal-actions">
      <button
        class="btn-modal btn-modal--cancel"
        (click)="closeAddModal()"
        id="add-cancel-btn"
        [disabled]="isAdding"
      >
        Cancel
      </button>
      <button
        class="btn-modal btn-modal--primary"
        (click)="confirmAdd()"
        id="add-confirm-btn"
        [disabled]="isAdding || form.invalid"
      >
        @if (isAdding) {
          <span class="btn-spinner"></span>
          Adding…
        } @else {
          <i class="bi bi-plus-lg"></i>
          Add Category
        }
      </button>
    </div>
  </div>
</div>
