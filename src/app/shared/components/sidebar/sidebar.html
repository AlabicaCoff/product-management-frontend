<div
  class="d-flex flex-column flex-shrink-0 p-3 bg-light border-end"
  style="width: 250px; min-height: 100vh"
>
  <!-- Branding / Logo -->
  <a
    routerLink="/"
    class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
  >
    <span class="fs-4 fw-bold">Product Management</span>
  </a>
  <hr />

  <!-- Navigation Links -->
  <ul class="nav nav-pills flex-column mb-auto">
    <li class="nav-item">
      <a routerLink="/products" routerLinkActive="active" class="nav-link"> Products </a>
    </li>
    <li class="nav-item">
      <a routerLink="/categories" routerLinkActive="active" class="nav-link"> Categories </a>
    </li>
  </ul>

  <!-- User Logout Section -->
  <hr />
  <div class="logout-wrapper">
    <button
      (click)="logout()"
      class="logout-btn w-100 d-flex align-items-center justify-content-center gap-2"
      aria-label="Logout"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </button>
  </div>
</div>
