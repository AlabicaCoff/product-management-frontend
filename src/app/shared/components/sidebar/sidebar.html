<div
  class="d-flex flex-column flex-shrink-0 p-3 bg-light border-end"
  style="width: 250px; min-height: 100vh"
>
  <!-- Branding / Logo -->
  <a
    routerLink="/"
    class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-dark text-decoration-none"
  >
    <span class="fs-4 fw-bold">Product Management</span>
  </a>
  <hr />

  <!-- Navigation Links -->
  <ul class="nav nav-pills flex-column mb-auto">
    <li class="nav-item">
      <a routerLink="/products" routerLinkActive="active" class="nav-link"> Products </a>
    </li>
    <li class="nav-item">
      <a routerLink="/categories" routerLinkActive="active" class="nav-link"> Categories </a>
    </li>
  </ul>

  <!-- Optional Bottom Section (e.g., User logout) -->
  <hr />
  <div class="dropdown">
    <button
      (click)="logout()"
      class="d-flex align-items-center text-decoration-none bg-transparent logout-btn"
    >
      <strong>Logout</strong>
    </button>
  </div>
</div>
